<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
<script>
(function () {
  function wire() {
    var ta = document.getElementById("hex-workspace-prompt");
    var exec = document.getElementById("hex-workspace-execute");
    if (!ta || !exec) return;
    exec.addEventListener("click", function () {
      var text = (ta.value || "").trim();
      if (!text) return;
      var id = self.crypto.randomUUID();
      try {
        sessionStorage.setItem("hex-chat-bootstrap", JSON.stringify({ threadId: id, prompt: text }));
      } catch (e) {}
      var target = "/run-scan/chat?t=" + encodeURIComponent(id);
      if (window.top) window.top.location.href = target;
      else window.location.href = target;
    });
  }
  if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", wire);
  else wire();
})();
</script>
